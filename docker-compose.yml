version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${SERVER_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - minio

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: backend
    restart: always
    depends_on:
      - db
      - minio
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
      - S3_BUCKET=${MINIO_BUCKET_NAME}
      - EXTERNAL_HOST=${SERVER_HOST}
      - EXTERNAL_PORT=${SERVER_PORT}
      - FOOD_CLASSIFIER_ENABLED=${FOOD_CLASSIFIER_ENABLED}
      - FOOD_CLASSIFIER_MODEL=${FOOD_CLASSIFIER_MODEL}
      - FOOD_CLASSIFIER_TOP_K=${FOOD_CLASSIFIER_TOP_K}

volumes:
  postgres_data:
  minio_data:
